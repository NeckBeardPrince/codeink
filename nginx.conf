server {
    # nginx-unprivileged runs as a non-root user and cannot bind port 80
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    include /etc/nginx/security-headers.conf;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 256;

    # The service worker controls update propagation; never cache it
    location = /sw.js {
        add_header Cache-Control "no-cache";
        include /etc/nginx/security-headers.conf;
    }

    # Vendored assets live in version-stamped directories, safe to cache hard
    location ^~ /vendor/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        include /etc/nginx/security-headers.conf;
    }

    # Cache other static assets briefly
    location ~* \.(css|js)$ {
        expires 1h;
        add_header Cache-Control "public, no-transform";
        include /etc/nginx/security-headers.conf;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
